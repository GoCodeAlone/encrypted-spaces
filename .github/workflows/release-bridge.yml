name: Bridge Release Contract

# Contract-only RED workflow. It validates the future public release shape but
# does not publish releases and does not claim release readiness yet.
# release_ready: false
on:
  workflow_dispatch: {}

permissions:
  contents: read

env:
  RELEASE_READY: false
  UPSTREAM_COMMIT: 4cda0ae87698135aa672990e6e68cf7873847426
  RUST_VERSION: 1.94.1
  RISC0_SKIP_BUILD: 1
  PROVENANCE: required-before-publish

jobs:
  contract:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout pinned upstream descendant
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0

      - name: Validate public release contract
        shell: bash
        run: |
          set -euo pipefail
          test "$RELEASE_READY" = false
          git merge-base --is-ancestor "$UPSTREAM_COMMIT" "$GITHUB_SHA"
          grep -Fq 'kdl = { version = "=6.5.0"' Cargo.toml
          grep -Fq 'version = "6.5.0"' Cargo.lock
          test -f LICENSE
          # NOTICE is a deliberate release gate until the legal attribution
          # file is supplied; this workflow must stay RED before publishing.
          test -f NOTICE
          test -f PATCHES.md
          grep -Fq "$UPSTREAM_COMMIT" PATCHES.md
          grep -Fq '800495f' PATCHES.md
          grep -Fq "Rust $RUST_VERSION" PATCHES.md

      - name: Install pinned Rust toolchain and expose matching tools
        shell: bash
        run: |
          set -euo pipefail
          rustup toolchain install "$RUST_VERSION" --profile minimal
          RUSTC="$(rustup which --toolchain "$RUST_VERSION" rustc)"
          RUSTDOC="$(rustup which --toolchain "$RUST_VERSION" rustdoc)"
          echo "RUSTUP_TOOLCHAIN=$RUST_VERSION" >> "$GITHUB_ENV"
          echo "RUSTC=$RUSTC" >> "$GITHUB_ENV"
          echo "RUSTDOC=$RUSTDOC" >> "$GITHUB_ENV"
          echo "$(dirname "$RUSTC")" >> "$GITHUB_PATH"
          "$RUSTC" --version | grep -Fq " $RUST_VERSION "
          "$RUSTDOC" --version | grep -Fq " $RUST_VERSION "

      - name: Validate build and publication markers
        shell: bash
        run: |
          set -euo pipefail
          grep -Fq 'sha256sum' .github/workflows/release-bridge.yml
          grep -Fq 'shasum -a 256' .github/workflows/release-bridge.yml
          grep -Fq 'provenance' .github/workflows/release-bridge.yml
          grep -Fq 'LICENSE' .github/workflows/release-bridge.yml
          grep -Fq 'NOTICE' .github/workflows/release-bridge.yml
          grep -Fq 'does not publish' .github/workflows/release-bridge.yml

  assets:
    needs: contract
    strategy:
      matrix:
        include:
          - component: backend
            os: ubuntu-24.04
            target: linux-amd64
            archive: encrypted-spaces-backend-linux-amd64.tar.gz
          - component: backend
            os: ubuntu-24.04
            target: linux-arm64
            archive: encrypted-spaces-backend-linux-arm64.tar.gz
          - component: backend
            os: macos-13
            target: macos-amd64
            archive: encrypted-spaces-backend-macos-amd64.tar.gz
          - component: backend
            os: macos-14
            target: macos-arm64
            archive: encrypted-spaces-backend-macos-arm64.tar.gz
          - component: bridge
            os: ubuntu-24.04
            target: linux-amd64
            archive: encrypted-spaces-bridge-linux-amd64.tar.gz
          - component: bridge
            os: ubuntu-24.04
            target: linux-arm64
            archive: encrypted-spaces-bridge-linux-arm64.tar.gz
          - component: bridge
            os: macos-13
            target: macos-amd64
            archive: encrypted-spaces-bridge-macos-amd64.tar.gz
          - component: bridge
            os: macos-14
            target: macos-arm64
            archive: encrypted-spaces-bridge-macos-arm64.tar.gz
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout release contents
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Verify dist release contract
        shell: bash
        env:
          DIST_CONTRACT: dist
          ARCHIVE: ${{ matrix.archive }}
        run: |
          set -euo pipefail
          archive="$DIST_CONTRACT/$ARCHIVE"
          checksum="$DIST_CONTRACT/checksums/$ARCHIVE.sha256"
          provenance="$DIST_CONTRACT/provenance/$ARCHIVE.intoto.jsonl"
          license="$DIST_CONTRACT/LICENSE"
          notice="$DIST_CONTRACT/NOTICE"
          manifest="$DIST_CONTRACT/release-manifest.json"
          test -s "$manifest"
          test -s "$archive"
          test -s "$checksum"
          test -s "$provenance"
          test -s "$license"
          test -s "$notice"
          grep -Fq "$ARCHIVE" "$manifest"
          grep -Fq "$ARCHIVE" "$checksum"
          grep -Fq "$ARCHIVE" "$provenance"
          grep -Fq 'Apache License' "$license"
          grep -Fq 'Apache' "$notice"
