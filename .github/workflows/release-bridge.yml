name: Bridge Release Contract

# Manual validation only. This workflow does not publish release assets.
on:
  workflow_dispatch:

permissions:
  contents: read

env:
  RELEASE_READY: false
  RELEASE_VERSION: 0.1.0
  UPSTREAM_COMMIT: 4cda0ae87698135aa672990e6e68cf7873847426
  RUST_VERSION: 1.94.1
  RISC0_SKIP_BUILD: 1

jobs:
  legal:
    name: Legal and source contract
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout pinned source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0

      - name: Verify legal and source records
        shell: bash
        run: |
          set -euo pipefail
          test "$RELEASE_READY" = false
          git merge-base --is-ancestor "$UPSTREAM_COMMIT" "$GITHUB_SHA"
          test -s LICENSE
          test -s NOTICE
          test -s PATCHES.md
          grep -Fq "$UPSTREAM_COMMIT" PATCHES.md
          grep -Fq '800495f' PATCHES.md
          grep -Fq "Rust \`$RUST_VERSION\`" PATCHES.md
          grep -Fq 'kdl = { version = "=6.5.0"' Cargo.toml
          grep -Fq 'version = "6.5.0"' Cargo.lock

      - name: Verify pinned Rust toolchain
        shell: bash
        run: |
          set -euo pipefail
          rustup toolchain install "$RUST_VERSION" --profile minimal
          rustup run "$RUST_VERSION" rustc --version | grep -Fq " $RUST_VERSION "
          rustup run "$RUST_VERSION" rustdoc --version | grep -Fq " $RUST_VERSION "

  assets:
    name: ${{ matrix.archive }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: backend
            package: encrypted-spaces-backend-server
            binary: encrypted-spaces-backend-server
            os: ubuntu-24.04
            target: linux-amd64
            archive: encrypted-spaces-backend-linux-amd64.tar.gz
          - component: backend
            package: encrypted-spaces-backend-server
            binary: encrypted-spaces-backend-server
            os: ubuntu-24.04
            target: linux-arm64
            archive: encrypted-spaces-backend-linux-arm64.tar.gz
          - component: backend
            package: encrypted-spaces-backend-server
            binary: encrypted-spaces-backend-server
            os: macos-15-intel
            target: macos-amd64
            archive: encrypted-spaces-backend-macos-amd64.tar.gz
          - component: backend
            package: encrypted-spaces-backend-server
            binary: encrypted-spaces-backend-server
            os: macos-14
            target: macos-arm64
            archive: encrypted-spaces-backend-macos-arm64.tar.gz
          - component: bridge
            package: encrypted-spaces-bridge
            binary: encrypted-spaces-bridge
            os: ubuntu-24.04
            target: linux-amd64
            archive: encrypted-spaces-bridge-linux-amd64.tar.gz
          - component: bridge
            package: encrypted-spaces-bridge
            binary: encrypted-spaces-bridge
            os: ubuntu-24.04
            target: linux-arm64
            archive: encrypted-spaces-bridge-linux-arm64.tar.gz
          - component: bridge
            package: encrypted-spaces-bridge
            binary: encrypted-spaces-bridge
            os: macos-15-intel
            target: macos-amd64
            archive: encrypted-spaces-bridge-macos-amd64.tar.gz
          - component: bridge
            package: encrypted-spaces-bridge
            binary: encrypted-spaces-bridge
            os: macos-14
            target: macos-arm64
            archive: encrypted-spaces-bridge-macos-arm64.tar.gz
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout pinned source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Build and test with the pinned toolchain
        shell: bash
        env:
          PACKAGE: ${{ matrix.package }}
          BINARY: ${{ matrix.binary }}
        run: |
          set -euo pipefail
          rustup toolchain install "$RUST_VERSION" --profile minimal
          rustup run "$RUST_VERSION" cargo test --locked -p "$PACKAGE" --no-run
          rustup run "$RUST_VERSION" cargo build --locked --release -p "$PACKAGE"
          built="$GITHUB_WORKSPACE/target/release/$BINARY"
          test -x "$built"
          echo "BUILT_BINARY=$built" >> "$GITHUB_ENV"

      - name: Verify release asset
        shell: bash
        env:
          DIST_CONTRACT: dist
          COMPONENT: ${{ matrix.component }}
          TARGET: ${{ matrix.target }}
          ARCHIVE: ${{ matrix.archive }}
        run: |
          set -euo pipefail
          archive="$DIST_CONTRACT/$ARCHIVE"
          checksum="$DIST_CONTRACT/checksums/$ARCHIVE.sha256"
          provenance="$DIST_CONTRACT/provenance/$ARCHIVE.intoto.jsonl"
          manifest="$DIST_CONTRACT/release-manifest.json"
          test -s "$manifest"
          test -s "$archive"
          test -s "$checksum"
          test -s "$provenance"

          extract="$(mktemp -d)"
          trap 'rm -rf "$extract"' EXIT
          tar -xzf "$archive" -C "$extract"
          packaged="$(find "$extract" -type f -name "encrypted-spaces-$COMPONENT" -print -quit)"
          test -n "$packaged"
          test -x "$packaged"
          cmp "$BUILT_BINARY" "$packaged"

          description="$(file -b "$packaged")"
          case "$TARGET" in
            linux-amd64)  grep -Eq 'ELF 64-bit.*(x86-64|x86_64)' <<< "$description" ;;
            linux-arm64)  grep -Eq 'ELF 64-bit.*(ARM aarch64|aarch64)' <<< "$description" ;;
            macos-amd64)  grep -Eq 'Mach-O 64-bit.*x86_64' <<< "$description" ;;
            macos-arm64)  grep -Eq 'Mach-O 64-bit.*arm64' <<< "$description" ;;
            *) echo "unsupported release target: $TARGET" >&2; exit 1 ;;
          esac
          python3 - "$packaged" "$RELEASE_VERSION" <<'PY'
          import subprocess
          import sys

          result = subprocess.run(
              [sys.argv[1], "--version"],
              check=True,
              capture_output=True,
              text=True,
              timeout=5,
          )
          output = result.stdout + result.stderr
          if sys.argv[2] not in output:
              raise SystemExit(f"version output does not contain {sys.argv[2]}: {output!r}")
          PY

          jq -e \
            --arg component "$COMPONENT" \
            --arg target "$TARGET" \
            --arg archive "$ARCHIVE" \
            --arg upstream "$UPSTREAM_COMMIT" \
            --arg toolchain "$RUST_VERSION" '
              .upstream_commit == $upstream and
              .rust_toolchain == $toolchain and
              .version == env.RELEASE_VERSION and
              (.artifacts | length == 8) and
              ([.artifacts[].archive] | unique | length == 8) and
              ([.artifacts[] | select(
                .component == $component and
                .target == $target and
                .archive == $archive and
                .binary == ("encrypted-spaces-" + $component) and
                .version == env.RELEASE_VERSION and
                (.sha256 | test("^[0-9a-f]{64}$"))
              )] | length == 1)
            ' "$manifest"
          manifest_digest="$(jq -er \
            --arg component "$COMPONENT" \
            --arg target "$TARGET" \
            --arg archive "$ARCHIVE" '
              .artifacts[] |
              select(
                .component == $component and
                .target == $target and
                .archive == $archive
              ) |
              .sha256
            ' "$manifest")"

          if [[ "$RUNNER_OS" == Linux ]]; then
            actual_digest="$(sha256sum "$archive" | awk '{print $1}')"
            (cd "$DIST_CONTRACT" && sha256sum -c "checksums/$ARCHIVE.sha256")
          elif [[ "$RUNNER_OS" == macOS ]]; then
            actual_digest="$(shasum -a 256 "$archive" | awk '{print $1}')"
            (cd "$DIST_CONTRACT" && shasum -a 256 -c "checksums/$ARCHIVE.sha256")
          else
            echo "unsupported checksum platform: $RUNNER_OS" >&2
            exit 1
          fi
          test "$actual_digest" = "$manifest_digest"

          jq -se \
            --arg archive "$ARCHIVE" \
            --arg digest "$actual_digest" \
            --arg upstream "$UPSTREAM_COMMIT" \
            --arg toolchain "$RUST_VERSION" '
              length > 0 and any(.[];
                ._type == "https://in-toto.io/Statement/v1" and
                .predicateType == "https://slsa.dev/provenance/v1" and
                any(.subject[]?;
                  .name == $archive and .digest.sha256 == $digest
                ) and
                .predicate.buildDefinition.externalParameters.upstream_commit == $upstream and
                .predicate.buildDefinition.externalParameters.rust_toolchain == $toolchain
              )
            ' "$provenance"

          listing="$(tar -tzf "$archive")"
          for required in "encrypted-spaces-$COMPONENT" LICENSE NOTICE; do
            awk -F/ -v required="$required" '
              $NF == required { found = 1 }
              END { exit !found }
            ' <<< "$listing"
          done

  aggregate:
    name: Release contract result
    if: ${{ always() }}
    needs: [legal, assets]
    runs-on: ubuntu-24.04
    steps:
      - name: Require all release gates
        shell: bash
        env:
          LEGAL_RESULT: ${{ needs.legal.result }}
          ASSET_RESULT: ${{ needs.assets.result }}
        run: |
          set -euo pipefail
          test "$LEGAL_RESULT" = success
          test "$ASSET_RESULT" = success
